<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서든어택 맵 지명 3D 뷰어</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root{--bg:#0a0b0e;--surface:#111318;--surface2:#1a1d25;--border:#252935;--accent:#e8b84b;--blue:#3a8fd4;--red:#d43a3a;--text:#e0e4f0;--muted:#7a8099;--lbg:rgba(8,9,12,0.88);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);z-index:100;flex-shrink:0;}
  .logo{font-family:'Black Han Sans',sans-serif;font-size:1.3rem;color:var(--accent);letter-spacing:1px;}
  .logo span{color:var(--text);}
  .sub{font-size:.7rem;color:var(--muted);margin-top:1px;}
  .hint{font-size:.7rem;color:var(--muted);text-align:right;line-height:1.7;}
  .main{display:flex;flex:1;overflow:hidden;}
  .sidebar{width:170px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:8px 0;}
  .stitle{font-size:.6rem;font-weight:700;letter-spacing:2px;color:var(--muted);padding:6px 14px 8px;text-transform:uppercase;}
  .mb{width:100%;background:none;border:none;cursor:pointer;padding:9px 14px;text-align:left;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:.82rem;transition:all .15s;border-left:3px solid transparent;}
  .mb:hover{background:var(--surface2);color:var(--text);}
  .mb.on{background:var(--surface2);color:var(--accent);border-left-color:var(--accent);font-weight:700;}
  .mb .tag{display:block;font-size:.6rem;color:var(--muted);margin-top:1px;font-weight:300;}
  .mb.on .tag{color:var(--accent);opacity:.7;}
  .cw{flex:1;position:relative;overflow:hidden;}
  #cv{display:block;width:100%;height:100%;}
  .ip{position:absolute;top:12px;left:12px;background:var(--lbg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:155px;pointer-events:none;backdrop-filter:blur(8px);}
  .ip h2{font-family:'Black Han Sans',sans-serif;font-size:1.1rem;color:var(--accent);margin-bottom:3px;}
  .ip p{font-size:.7rem;color:var(--muted);line-height:1.5;white-space:pre-line;}
  .leg{position:absolute;bottom:12px;right:12px;background:var(--lbg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;pointer-events:none;backdrop-filter:blur(8px);}
  .lt{font-size:.6rem;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
  .li{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:.7rem;color:var(--text);}
  .ld{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
  .hb{position:absolute;bottom:12px;left:12px;background:var(--lbg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:.67rem;color:var(--muted);line-height:1.8;pointer-events:none;backdrop-filter:blur(8px);}
  .hb kbd{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:.65rem;color:var(--text);font-family:monospace;}
  .tt{position:absolute;top:12px;right:12px;display:flex;gap:6px;}
  .tb{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--lbg);color:var(--muted);font-size:.72rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;backdrop-filter:blur(8px);transition:all .15s;}
  .tb:hover{color:var(--text);}
  .tb.ab{background:rgba(58,143,212,.22);border-color:var(--blue);color:var(--blue);font-weight:700;}
  .tb.ar{background:rgba(212,58,58,.22);border-color:var(--red);color:var(--red);font-weight:700;}
  #ld{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:50;transition:opacity .4s;}
  #ld.h{opacity:0;pointer-events:none;}
  .sp{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .sidebar::-webkit-scrollbar{width:4px;}
  .sidebar::-webkit-scrollbar-track{background:transparent;}
  .sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>

const cv=document.getElementById('cv');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x08090c);
scene.fog=new THREE.Fog(0x08090c,65,140);

const camera=new THREE.PerspectiveCamera(45,1,0.1,500);
scene.add(new THREE.AmbientLight(0xffffff,0.5));
const sun=new THREE.DirectionalLight(0xffffff,0.7);
sun.position.set(15,25,10); sun.castShadow=true; scene.add(sun);
scene.add(Object.assign(new THREE.DirectionalLight(0x7799cc,0.2),{position:{set:()=>{}}}) );
const fl=new THREE.DirectionalLight(0x7799cc,0.2);
fl.position.set(-10,10,-15); scene.add(fl);
scene.add(new THREE.GridHelper(90,90,0x181c24,0x10141c));

// ============================================================
//  오빗 컨트롤
// ============================================================
let drag=false,rDrag=false,prev={x:0,y:0};
let sph={theta:.9,phi:1.05,r:55};
let tgt=new THREE.Vector3();

function applyCamera(){
  camera.position.set(
    tgt.x+sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),
    tgt.y+sph.r*Math.cos(sph.phi),
    tgt.z+sph.r*Math.sin(sph.phi)*Math.cos(sph.theta)
  );
  camera.lookAt(tgt);
}

cv.addEventListener('mousedown',e=>{drag=true;rDrag=e.button===2;prev={x:e.clientX,y:e.clientY};e.preventDefault();});
cv.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  const dx=e.clientX-prev.x,dy=e.clientY-prev.y;
  if(rDrag){
    const r=new THREE.Vector3(),u=new THREE.Vector3();
    camera.getWorldDirection(r);r.cross(camera.up).normalize();u.copy(camera.up);
    tgt.addScaledVector(r,-dx*.04);tgt.addScaledVector(u,dy*.04);
  }else{
    sph.theta-=dx*.007;
    sph.phi=Math.max(.1,Math.min(Math.PI/2.1,sph.phi-dy*.007));
  }
  prev={x:e.clientX,y:e.clientY};applyCamera();
});
window.addEventListener('mouseup',()=>drag=false);
cv.addEventListener('wheel',e=>{sph.r=Math.max(8,Math.min(95,sph.r+e.deltaY*.04));applyCamera();e.preventDefault();},{passive:false});
window.addEventListener('keydown',e=>{if(e.key==='r'||e.key==='R')resetView(currentMap);});

// ============================================================
//  뷰 리셋
// ============================================================
function resetView(key){
  const d=MAPS[key]?.cam;
  if(!d){sph={theta:.9,phi:1.05,r:55};tgt.set(0,0,0);}
  else{sph={theta:d.theta,phi:d.phi,r:d.r};tgt.set(d.tx||0,0,d.tz||0);}
  applyCamera();
}

// ============================================================
//  맵 빌드
// ============================================================
let objs=[],labels=[];

function clearScene(){objs.forEach(o=>scene.remove(o));objs=[];labels.forEach(d=>d.remove());labels=[];}

const matCache={};
function getMat(color,transparent=false,opacity=1){
  const k=`${color}_${transparent}_${opacity}`;
  if(!matCache[k])matCache[k]=new THREE.MeshLambertMaterial({color,transparent,opacity});
  return matCache[k];
}

function buildMap(key){
  clearScene();
  const md=MAPS[key]; if(!md)return;
  document.getElementById('mt').textContent=md.title;
  document.getElementById('md').textContent=md.desc;

  md.zones.forEach(z=>{
    // 바닥
    if(z.type==='floor'){
      const m=new THREE.Mesh(new THREE.BoxGeometry(z.w,.1,z.d),getMat(0x141820));
      m.position.set(z.x,-.05,z.z); m.receiveShadow=true;
      scene.add(m); objs.push(m); return;
    }
    // 벽
    if(z.type==='wall'){
      const h=z.h||2.8;
      const m=new THREE.Mesh(new THREE.BoxGeometry(z.w,h,z.d),getMat(0x1a1e2c,true,.6));
      m.position.set(z.x,h/2,z.z); m.castShadow=true;
      scene.add(m); objs.push(m); return;
    }
    // 구역
    if(z.type==='zone'){
      const isBomb=z.bombsite;
      const tc=isBomb?TC.bomb:(TC[z.team]||TC.mid);
      const h=.28;
      const geo=new THREE.BoxGeometry(z.w,h,z.d);
      const mesh=new THREE.Mesh(geo,getMat(tc.f,true,.9));
      mesh.position.set(z.x,h/2,z.z); mesh.receiveShadow=true;
      scene.add(mesh); objs.push(mesh);
      // 테두리
      const edge=new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:tc.e,transparent:true,opacity:.65}));
      edge.position.copy(mesh.position); scene.add(edge); objs.push(edge);
      // 폭탄 마커
      if(isBomb){
        const cyl=new THREE.Mesh(new THREE.CylinderGeometry(.65,.65,.07,16),getMat(0xe8b84b));
        cyl.position.set(z.x,h+.035,z.z); scene.add(cyl); objs.push(cyl);
      }
      // 레이블
      if(z.label) makeLabel(z.label,z.x,h+.3,z.z,tc.e);
    }
  });
}

// ============================================================
//  레이블
// ============================================================
function makeLabel(text,wx,wy,wz,ec){
  const col='#'+ec.toString(16).padStart(6,'0');
  const d=document.createElement('div');
  d.style.cssText=`position:absolute;pointer-events:auto;cursor:default;
    transform:translate(-50%,-100%);background:rgba(8,9,12,.88);
    border:1px solid ${col};border-radius:5px;padding:3px 8px;
    font-size:.67rem;font-family:'Noto Sans KR',sans-serif;
    color:${col};white-space:pre-line;text-align:center;line-height:1.45;
    backdrop-filter:blur(4px);transition:transform .1s,background .1s;user-select:none;`;
  d.textContent=text;
  d.dataset.wx=wx; d.dataset.wy=wy; d.dataset.wz=wz;
  d.addEventListener('mouseenter',()=>{d.style.background='rgba(22,26,38,.96)';d.style.transform='translate(-50%,-100%) scale(1.08)';});
  d.addEventListener('mouseleave',()=>{d.style.background='rgba(8,9,12,.88)';d.style.transform='translate(-50%,-100%)';});
  document.querySelector('.cw').appendChild(d);
  labels.push(d);
}

function updateLabels(){
  const wrap=document.querySelector('.cw');
  const R=wrap.getBoundingClientRect();
  const W=R.width,H=R.height;
  labels.forEach(d=>{
    const v=new THREE.Vector3(+d.dataset.wx,+d.dataset.wy,+d.dataset.wz);
    v.project(camera);
    if(v.z>1){d.style.display='none';return;}
    d.style.display='';
    d.style.left=((v.x*.5+.5)*W)+'px';
    d.style.top=((-v.y*.5+.5)*H)+'px';
  });
}

// ============================================================
//  팀 토글
// ============================================================
function setT(t){
  document.getElementById('bb').className='tb'+(t==='blue'?' ab':'');
  document.getElementById('br').className='tb'+(t==='red'?' ar':'');
  const ba=document.getElementById('ba');
  ba.className='tb'; ba.style.color=t==='all'?'var(--accent)':'var(--muted)';
}

// ============================================================
//  리사이즈 & 루프
// ============================================================
function resize(){
  const cw=document.querySelector('.cw');
  renderer.setSize(cw.clientWidth,cw.clientHeight);
  camera.aspect=cw.clientWidth/cw.clientHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize); resize();
(function loop(){requestAnimationFrame(loop);renderer.render(scene,camera);updateLabels();})();

// ============================================================
//  맵 선택
// ============================================================
let currentMap='dragonroad';

document.querySelectorAll('.mb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mb').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    currentMap=btn.dataset.map;
    buildMap(currentMap);
    resetView(currentMap);
  });
});

buildMap('dragonroad');
resetView('dragonroad');
applyCamera();
document.getElementById('ld').classList.add('h');
