<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서든어택 맵 지명 3D 뷰어</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0b0e;
    --surface: #111318;
    --surface2: #1a1d25;
    --border: #252935;
    --accent: #e8b84b;
    --accent2: #ff4444;
    --blue-team: #3a8fd4;
    --red-team: #d43a3a;
    --text: #e0e4f0;
    --text-muted: #7a8099;
    --label-bg: rgba(10,11,14,0.88);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.3rem;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .logo span { color: var(--text); }

  .subtitle { font-size: 0.7rem; color: var(--text-muted); margin-top: 1px; }

  .controls-hint {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: right;
    line-height: 1.6;
  }

  /* ===== LAYOUT ===== */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ===== MAP LIST SIDEBAR ===== */
  .sidebar {
    width: 180px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 8px 0;
  }

  .sidebar-title {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-muted);
    padding: 6px 14px 8px;
    text-transform: uppercase;
  }

  .map-btn {
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
    padding: 10px 14px;
    text-align: left;
    color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.82rem;
    transition: all 0.15s;
    border-left: 3px solid transparent;
    position: relative;
  }
  .map-btn:hover { background: var(--surface2); color: var(--text); }
  .map-btn.active {
    background: var(--surface2);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 700;
  }

  .map-btn .map-tag {
    display: block;
    font-size: 0.6rem;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 300;
  }
  .map-btn.active .map-tag { color: var(--accent); opacity: 0.7; }

  /* ===== CANVAS AREA ===== */
  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #three-canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ===== INFO PANEL ===== */
  .info-panel {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--label-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    min-width: 160px;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  .info-panel h2 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 3px;
  }
  .info-panel p {
    font-size: 0.7rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* ===== LEGEND ===== */
  .legend {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: var(--label-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  .legend-title {
    font-size: 0.62rem;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 4px;
    font-size: 0.72rem;
    color: var(--text);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ===== CONTROLS HELP ===== */
  .help-bar {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: var(--label-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.68rem;
    color: var(--text-muted);
    line-height: 1.7;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  .help-bar kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0 4px;
    font-size: 0.66rem;
    color: var(--text);
    font-family: monospace;
  }

  /* ===== TEAM TOGGLE ===== */
  .team-toggle {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 6px;
  }
  .team-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--label-bg);
    color: var(--text-muted);
    font-size: 0.72rem;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    backdrop-filter: blur(8px);
    transition: all 0.15s;
  }
  .team-btn:hover { color: var(--text); }
  .team-btn.active-blue { background: rgba(58,143,212,0.25); border-color: var(--blue-team); color: var(--blue-team); font-weight: 700; }
  .team-btn.active-red { background: rgba(212,58,58,0.25); border-color: var(--red-team); color: var(--red-team); font-weight: 700; }

  /* ===== LOADING ===== */
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 50;
    transition: opacity 0.4s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>

</header>

<div class="main">

  <aside class="sidebar">

    </button>

      제5보급창고
      <span class="map-tag">Supply-5 · 폭파</span>
    </button>
    <button class="map-btn" data-map="oldtown">
      올드타운
      <span class="map-tag">Old Town · 폭파</span>
    </button>
    <button class="map-btn" data-map="crossport">
      크로스포트
      <span class="map-tag">Crossport · 폭파</span>
    </button>
    <button class="map-btn" data-map="provence">
      프로방스
      <span class="map-tag">Provence · 폭파</span>
    </button>
    <button class="map-btn" data-map="desert2">
      데저트2

    </button>
    <button class="map-btn" data-map="dragonroad">
      드래곤로드

    </button>
    <button class="map-btn" data-map="citycat">

  </aside>

  <!-- Canvas -->

    <div id="loading"><div class="spinner"></div></div>

    <div class="info-panel" id="info-panel">

      <p id="map-desc">듀오 맵의 2폭 버전<br>랭크전 5vs5 핵심 맵</p>
    </div>

    <div class="team-toggle">
      <button class="team-btn active-blue" id="btn-blue" onclick="setTeam('blue')">🔵 블루</button>

    </div>

    <div class="legend">

      <div class="legend-item"><div class="legend-dot" style="background:#d43a3a"></div>B 지역 (레드 스폰측)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e8b84b"></div>폭탄 설치 지점</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8855cc"></div>미드 / 센터</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4caf89"></div>경로 / 통로</div>
      <div class="legend-item"><div class="legend-dot" style="background:#888"></div>벽 / 구조물</div>
    </div>

    <div class="help-bar">
      <kbd>드래그</kbd> 회전 &nbsp;
      <kbd>휠</kbd> 줌 &nbsp;
      <kbd>우클릭</kbd> 이동 &nbsp;
      <kbd>R</kbd> 뷰 리셋
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

//  THREE.JS SCENE
// ============================================================
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0b0e);
scene.fog = new THREE.Fog(0x0a0b0e, 50, 120);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 500);
camera.position.set(0, 28, 28);
camera.lookAt(0, 0, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x8899cc, 0.3);
fillLight.position.set(-10, 10, -10);
scene.add(fillLight);

// Grid helper
const gridHelper = new THREE.GridHelper(60, 60, 0x1a1d25, 0x151820);
scene.add(gridHelper);

// ============================================================
//  ORBIT CONTROLS (manual)
// ============================================================
let isDragging = false, isRightDrag = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: Math.PI/4, phi: Math.PI/3.5, r: 38 };
let target = new THREE.Vector3(0, 0, 0);

function updateCamera() {
  const x = target.x + spherical.r * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  const y = target.y + spherical.r * Math.cos(spherical.phi);
  const z = target.z + spherical.r * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.set(x, y, z);
  camera.lookAt(target);
}
updateCamera();

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  isRightDrag = e.button === 2;
  prevMouse = { x: e.clientX, y: e.clientY };
  e.preventDefault();
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  if (isRightDrag) {
    const right = new THREE.Vector3();
    const up = new THREE.Vector3();
    camera.getWorldDirection(right);
    right.cross(camera.up).normalize();
    up.copy(camera.up);
    target.addScaledVector(right, -dx * 0.03);
    target.addScaledVector(up, dy * 0.03);
  } else {
    spherical.theta -= dx * 0.008;
    spherical.phi = Math.max(0.15, Math.min(Math.PI/2.2, spherical.phi - dy * 0.008));
  }
  prevMouse = { x: e.clientX, y: e.clientY };
  updateCamera();
});

window.addEventListener('mouseup', () => { isDragging = false; });

canvas.addEventListener('wheel', e => {
  spherical.r = Math.max(8, Math.min(80, spherical.r + e.deltaY * 0.04));
  updateCamera();
  e.preventDefault();
}, { passive: false });

window.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') resetView();
});

function resetView() {
  spherical = { theta: Math.PI/4, phi: Math.PI/3.5, r: 38 };
  target.set(0, 0, 0);
  updateCamera();
}

// ============================================================
//  MAP BUILDING
// ============================================================
let currentObjects = [];
let labelDivs = [];
let currentTeamFilter = 'both';

function clearMap() {
  currentObjects.forEach(o => scene.remove(o));
  currentObjects = [];
  labelDivs.forEach(d => d.remove());
  labelDivs = [];
}

function buildMap(mapKey) {
  clearMap();
  const mapData = MAPS[mapKey];
  if (!mapData) return;

  // Update info
  document.getElementById('map-title').textContent = mapData.title;
  document.getElementById('map-desc').textContent = mapData.desc;

  mapData.zones.forEach(z => {
    if (z.type === 'floor') {
      const geo = new THREE.BoxGeometry(z.w, 0.15, z.d);
      const mat = new THREE.MeshLambertMaterial({ color: z.color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(z.x, -0.075, z.z);
      mesh.receiveShadow = true;
      scene.add(mesh);
      currentObjects.push(mesh);
      return;
    }

    if (z.type === 'wall') {
      const geo = new THREE.BoxGeometry(z.w, z.h || 3, z.d);
      const mat = new THREE.MeshLambertMaterial({ color: 0x2a2e3a, transparent: true, opacity: 0.7 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(z.x, (z.y || 0) + (z.h || 3) / 2, z.z);
      mesh.castShadow = true;
      scene.add(mesh);
      currentObjects.push(mesh);
      return;
    }

    if (z.type === 'zone') {
      const yBase = z.elevated ? 1.5 : 0;
      const h = 0.3;
      const geo = new THREE.BoxGeometry(z.w, h, z.d);

      let color = z.color;
      if (z.team === 'blue') color = 0x1a4080;
      else if (z.team === 'red') color = 0x802020;
      else if (z.team === 'mid') color = 0x3a2a5c;

      if (z.bombsite) color = 0x8a6a10;

      const mat = new THREE.MeshLambertMaterial({ color, transparent: true, opacity: 0.85 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(z.x, yBase + h / 2, z.z);
      mesh.receiveShadow = true;
      mesh.userData = { zone: z, originalColor: color, mat };
      scene.add(mesh);
      currentObjects.push(mesh);

      // Bombsite marker
      if (z.bombsite) {
        const markerGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.1, 16);
        const markerMat = new THREE.MeshLambertMaterial({ color: 0xe8b84b, emissive: 0x4a3800 });
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.position.set(z.x, yBase + h + 0.05, z.z);
        scene.add(marker);
        currentObjects.push(marker);
      }

      // Team color edge glow
      if (z.team && z.label) {
        const edgeColor = z.team === 'blue' ? 0x3a8fd4 : z.team === 'red' ? 0xd43a3a : z.bombsite ? 0xe8b84b : 0x8855cc;
        const edgeGeo = new THREE.EdgesGeometry(geo);
        const edgeMat = new THREE.LineBasicMaterial({ color: edgeColor, transparent: true, opacity: 0.5 });
        const edges = new THREE.LineSegments(edgeGeo, edgeMat);
        edges.position.copy(mesh.position);
        scene.add(edges);
        currentObjects.push(edges);
      }

      // HTML label
      if (z.label) {
        createLabel(z, mesh.position);
      }
    }
  });
}

// ============================================================
//  HTML LABELS (CSS2D-like with manual projection)
// ============================================================
function createLabel(zone, pos3d) {
  const div = document.createElement('div');
  div.className = 'zone-label';
  div.style.cssText = `
    position: absolute;
    pointer-events: all;
    cursor: pointer;
    background: rgba(10,11,14,0.85);
    border: 1px solid ${zone.team === 'blue' ? '#3a8fd4' : zone.team === 'red' ? '#d43a3a' : zone.bombsite ? '#e8b84b' : '#8855cc'};
    border-radius: 5px;
    padding: 3px 7px;
    font-size: 0.68rem;
    font-family: 'Noto Sans KR', sans-serif;
    color: ${zone.team === 'blue' ? '#7ab8ee' : zone.team === 'red' ? '#ee7a7a' : zone.bombsite ? '#e8b84b' : '#bb88ff'};
    white-space: pre-line;
    text-align: center;
    line-height: 1.4;
    backdrop-filter: blur(4px);
    transition: transform 0.1s, background 0.1s;
    user-select: none;
    transform: translate(-50%, -100%);
  `;
  div.textContent = zone.label;
  div.dataset.x = pos3d.x;
  div.dataset.y = pos3d.y + 0.5;
  div.dataset.z = pos3d.z;

  div.addEventListener('mouseenter', () => {
    div.style.background = 'rgba(30,35,50,0.95)';
    div.style.transform = 'translate(-50%, -100%) scale(1.05)';
  });
  div.addEventListener('mouseleave', () => {
    div.style.background = 'rgba(10,11,14,0.85)';
    div.style.transform = 'translate(-50%, -100%)';
  });

  document.querySelector('.canvas-wrap').appendChild(div);
  labelDivs.push(div);
}

function updateLabels() {
  const wrap = document.querySelector('.canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const w = rect.width, h = rect.height;

  labelDivs.forEach(div => {
    const x = parseFloat(div.dataset.x);
    const y = parseFloat(div.dataset.y);
    const z = parseFloat(div.dataset.z);
    const v = new THREE.Vector3(x, y, z);
    v.project(camera);
    const sx = (v.x * 0.5 + 0.5) * w;
    const sy = (-v.y * 0.5 + 0.5) * h;
    // Hide if behind camera
    if (v.z > 1) { div.style.display = 'none'; return; }
    div.style.display = '';
    div.style.left = sx + 'px';
    div.style.top = sy + 'px';
  });
}

// ============================================================
//  TEAM FILTER
// ============================================================
function setTeam(team) {
  currentTeamFilter = team;
  document.getElementById('btn-blue').className = 'team-btn' + (team === 'blue' ? ' active-blue' : '');
  document.getElementById('btn-red').className = 'team-btn' + (team === 'red' ? ' active-red' : '');
  document.getElementById('btn-both').className = 'team-btn' + (team === 'both' ? '' : '');
  if (team === 'both') document.getElementById('btn-both').style.color = 'var(--accent)';
  else document.getElementById('btn-both').style.color = 'var(--text-muted)';

  labelDivs.forEach((div, i) => {
    // We don't have perfect zone-div mapping so just show all
  });
}

// ============================================================
//  RESIZE
// ============================================================
function resize() {
  const wrap = document.querySelector('.canvas-wrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ============================================================
//  RENDER LOOP
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
  updateLabels();
}
animate();

// ============================================================
//  MAP SELECTION
// ============================================================
let currentMap = 'duoric';

document.querySelectorAll('.map-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMap = btn.dataset.map;
    buildMap(currentMap);
    resetView();
  });
});

// Initial build
buildMap('duoric');
document.getElementById('loading').classList.add('hidden');
</script>
</body>
